name: Kanpur Cloud Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cleanup & Fix Perms
        run: |
          chmod +x gradlew
          ./gradlew clean

      - name: Build Zalith APK
        run: ./gradlew assembleDebug -x test -x lint -x configureNdkBuildDebug -x buildNdkBuildDebug --stacktrace --continue
