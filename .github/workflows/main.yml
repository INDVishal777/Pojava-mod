name: Kanpur Cloud Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Perms
        run: chmod +x gradlew

      - name: Build Zalith Mod APK
        run: ./gradlew assembleDebug -x test -x lint -x configureNdkBuildDebug -x buildNdkBuildDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Dev-launcher-Pojav-APK
          path: app_pojavlauncher/build/outputs/apk/debug/*.apk
